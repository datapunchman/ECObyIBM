    <line x1="24" y1="23" x2="36" y2="23" stroke="#0F62FE" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="24" y1="32" x2="40" y2="32" stroke="#0F62FE" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="24" y1="41" x2="36" y2="41" stroke="#0F62FE" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="44.31" cy="16.24" r="3.4" fill="#4DA3FF"/>
